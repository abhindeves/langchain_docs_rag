name: Generate Evaluation Dataset

on:
  schedule:
    # Run every 8 hours
    - cron: '0 */8 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  generate-dataset:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for AWS OIDC authentication
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Run Testset Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Fallback to defaults if secrets are not set yet
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          S3_BUCKET: ${{ secrets.S3_BUCKET || 'rag-document-store-57d6fd4' }}
        run: |
          uv run services/evaluation-service/src/generate_testset.py
