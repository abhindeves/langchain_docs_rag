services:
  qdrant:
    image: qdrant/qdrant
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network
    restart: unless-stopped

  api-service:
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET=change_me_local_development_only
      - LOG_LEVEL=INFO
      - AWS_REGION=ap-south-1
      - AWS_DEFAULT_REGION=ap-south-1
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - qdrant
    networks:
      - rag_network
    restart: unless-stopped

networks:
  rag_network:
    driver: bridge

volumes:
  qdrant_data:
